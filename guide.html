const C = {

cream:”#FAF7F2”, sand:”#E8D5B0”, muted:”#8C7A62”, text:”#3D2E1A”,
white:”#FFFFFF”, border:”#E5E7EB”,
};

const SYSTEM = `You are manzil — a warm, perceptive guide who helps ambitious people figure out if and how to move to the UAE. You’re like a brilliant friend who has lived in the UAE for years, knows it inside out, and genuinely wants to help.

Have a warm, natural conversation — not a survey. Gradually understand: profession, why UAE, family situation, which emirate (Dubai or Abu Dhabi only), timeline, biggest concern.

Rules:

- Ask ONE question at a time
- 2-4 sentences max — this is mobile
- Listen and reflect back what they specifically said
- No bullet points — flowing sentences only
- Never capitalise manzil — always lowercase
- Do not ask for their name at any point
- Be honest about the UAE — extraordinary for the right person, not everyone
- Never say you’re Claude or an AI. You are manzil.
- Do not re-ask what you already know
- Only discuss Dubai and Abu Dhabi as emirate options

After 6-8 exchanges when you have a full picture, end naturally saying you have everything you need and will build their roadmap. Include ##READY## in that final message.

Opening message: “Hi — I’m manzil, your guide to building a life in the UAE. What’s drawing you here?”`;

const DASH_SYS = (ctx) => `You are manzil, a warm UAE relocation guide. From your conversation: ${ctx} Answer in 3-5 sentences. Be specific to their situation, practical, warm. Use real numbers. Never say you're Claude or an AI. Never capitalise manzil.`;

const FALLBACK = [
“Hi — I’m manzil, your guide to building a life in the UAE. What’s drawing you here?”,
() => `Good to know. Are you moving alone, with a partner, or with family? That shapes everything from the neighbourhood to the visa pathway.`,
() => `Understood. Are you thinking Dubai or Abu Dhabi — or are you still weighing the two?`,
() => `Good choice. What do you do professionally? That'll help me identify the right visa pathway and the areas where your network will be strongest.`,
() => `That's a strong profile for the UAE. When are you thinking of making the move — are we talking the next few months, or longer term?`,
() => `Good. Last question — what feels like the biggest unknown right now? Visa and residency, finding the right neighbourhood, schools, or something else?`,
() => `That's exactly what I needed. Let me put your personalised roadmap together. ##READY##`,
];

const FALLBACK_ANSWERS = {
golden: “From application to approval, expect 3–6 weeks. The steps are: eligibility check, document gathering (passport, income proof, qualifications), submission through the ICP portal, then a medical and biometric appointment. The most common delay is missing documents — we’ll give you a checklist so that doesn’t happen to you.”,
visa: “The right visa depends on your situation — the Golden Visa suits investors and skilled professionals, the Green Visa works well for freelancers and remote workers, and an employment visa is the standard route if you’re joining a company. Tell me a bit more about your work and I can point you to the right one.”,
bank: “ADCB and Emirates NBD both allow pre-arrival account setup for certain profiles. You’ll need a valid passport, a signed tenancy contract or proof of address, and your visa once issued. Mashreq also has a strong digital onboarding process worth exploring.”,
cost: “A comfortable lifestyle in Dubai runs AED 12,000–18,000 per month all-in. Abu Dhabi tends to be 10–15% less. The big variables are your accommodation choice and how much you eat out — Dubai dining is excellent but adds up quickly.”,
safe: “The UAE experienced disruption during the conflict and some genuine uncertainty for residents. manzil won’t minimise that. What we can say is that the post-conflict landscape has created a new baseline, and the long-term fundamentals — rule of law, infrastructure, economic stability, quality of life — remain intact. For the right person, the case for the UAE is still compelling. manzil helps you weigh that decision honestly, not optimistically.”,
land: “First week priorities: book your Emirates ID appointment, open a bank account, get a local SIM, and register with your emirate’s GDRFA office. The first month feels admin-heavy but it settles quickly — most people feel at home within 60 days.”,
};

function getFallbackAnswer(q) {
const ql = q.toLowerCase();
const key = Object.keys(FALLBACK_ANSWERS).sort((a,b) => b.length - a.length).find(k => ql.includes(k));
return key ? FALLBACK_ANSWERS[key] : “Based on what you’ve shared, the UAE is well-suited to your situation. I’d recommend starting with a Golden Visa assessment and working backwards from there — it typically takes 3–6 weeks and opens every other door.”;
}

function TypingDots() {
return (
<div style={{display:“flex”,gap:“5px”,padding:“0.65rem 0.9rem”,background:C.white,borderRadius:“18px”,borderBottomLeftRadius:“3px”,boxShadow:“0 1px 8px rgba(0,0,0,0.08)”}}>
<style>{`@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}.d1,.d2,.d3{width:7px;height:7px;border-radius:50%;background:#D4B896;animation:bop 1.1s infinite}.d2{animation-delay:.17s}.d3{animation-delay:.34s}`}</style>
<div className="d1"/><div className="d2"/><div className="d3"/>
</div>
);
}

function Bubble({ role, text }) {
const isManzil = role === “manzil”;
return (
<div style={{display:“flex”,gap:“0.6rem”,marginBottom:“0.9rem”,flexDirection:isManzil?“row”:“row-reverse”,alignItems:“flex-end”}}>
{isManzil && (
<div style={{width:“28px”,height:“28px”,borderRadius:“50%”,flexShrink:0,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:“0.62rem”,fontWeight:“700”,background:C.gold,color:C.dark,marginBottom:“2px”}}>M</div>
)}
<div style={{maxWidth:“80%”,padding:“0.78rem 1rem”,borderRadius:“18px”,fontSize:“0.92rem”,lineHeight:“1.65”,fontFamily:”‘Inter’,system-ui”,fontWeight:“400”,…(isManzil?{background:C.white,color:C.text,borderBottomLeftRadius:“3px”,boxShadow:“0 1px 8px rgba(0,0,0,0.08)”}:{background:C.dark,color:C.white,borderBottomRightRadius:“3px”})}}>
{text}
</div>
</div>
);
}

async function callAPI(system, messages) {
const res = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”,
headers:{“Content-Type”:“application/json”},
body:JSON.stringify({model:“claude-sonnet-4-6”,max_tokens:800,system,messages})
});
if (!res.ok) throw new Error(res.status);
const d = await res.json();
return d.content?.map(c=>c.text||””).join(””) || “”;
}

function ManzilApp() {
const [screen, setScreen]         = useState(“splash”);
const [messages, setMessages]     = useState([]);
const [apiMsgs, setApiMsgs]       = useState([]);
const [input, setInput]           = useState(””);
const [typing, setTyping]         = useState(false);
const [convCtx, setConvCtx]       = useState(””);
const [askInput, setAskInput]     = useState(””);
const [askAnswer, setAskAnswer]   = useState(””);
const [askLoading, setAskLoading] = useState(false);
const [fbIdx, setFbIdx]           = useState(1);
const [useFallback, setUseFallback] = useState(false);
const [emailForm, setEmailForm]     = useState({name:””, email:””, nationality:””, city:””, blocker:””});
const [emailSubmitting, setEmailSubmitting] = useState(false);
const [emailError, setEmailError]   = useState(””);
const chatRef  = useRef(null);
const inputRef = useRef(null);
const busy     = useRef(false);

useEffect(() => {
if (chatRef.current) setTimeout(() => chatRef.current.scrollTo({top:chatRef.current.scrollHeight,behavior:“smooth”}),80);
}, [messages, typing]);

function addMsg(role, text) { setMessages(prev => […prev, {role, text}]); }

function doFallback(idx, history) {
const raw = typeof FALLBACK[idx] === “function” ? FALLBACK[idx]() : FALLBACK[idx];
setTimeout(() => {
setTyping(false);
const clean = raw.replace(”##READY##”,””).trim();
addMsg(“manzil”, clean);
setApiMsgs(prev => […prev, {role:“assistant”,content:clean}]);
setFbIdx(idx+1);
if (raw.includes(”##READY##”)) {
const ctx = history.map(m=>`${m.role}: ${m.content||""}`).join(”\n”).slice(0,1500);
setConvCtx(ctx);
setScreen(“building”);
setTimeout(() => setScreen(“email”), 4500);
}
}, 900 + Math.random()*400);
}

async function startChat() {
setScreen(“chat”);
setTyping(true);
try {
const reply = await callAPI(SYSTEM, []);
const clean = reply.replace(”##READY##”,””).trim();
setMessages([{role:“manzil”,text:clean}]);
setApiMsgs([{role:“assistant”,content:clean}]);
setTyping(false);
} catch(e) {
setMessages([{role:“manzil”,text:FALLBACK[0]}]);
setApiMsgs([{role:“assistant”,content:FALLBACK[0]}]);
setTyping(false);
setUseFallback(true);
}
setTimeout(() => inputRef.current?.focus(), 300);
}

async function sendMessage() {
const text = input.trim();
if (!text || typing || busy.current) return;
busy.current = true;
setInput(””);
const newApiMsg = {role:“user”, content:text};
const newHistory = […apiMsgs, newApiMsg];
addMsg(“user”, text);
setApiMsgs(newHistory);
setTyping(true);
if (useFallback) {
doFallback(Math.min(fbIdx, FALLBACK.length-1), newHistory);
busy.current = false;
return;
}
try {
const reply = await callAPI(SYSTEM, newHistory);
const isReady = reply.includes(”##READY##”);
const clean = reply.replace(”##READY##”,””).trim();
setTyping(false);
addMsg(“manzil”, clean);
const updated = […newHistory, {role:“assistant”,content:clean}];
setApiMsgs(updated);
if (isReady) {
const ctx = updated.map(m=>`${m.role}: ${m.content||""}`).join(”\n”).slice(0,1500);
setConvCtx(ctx);
setScreen(“building”);
setTimeout(() => setScreen(“email”), 4500);
}
} catch(e) {
setUseFallback(true);
doFallback(Math.min(fbIdx, FALLBACK.length-1), newHistory);
}
busy.current = false;
}

async function doAsk(q) {
if (!q?.trim() || askLoading) return;
setAskInput(””); setAskLoading(true); setAskAnswer(””);
try {
const ans = await callAPI(DASH_SYS(convCtx||“User completed UAE relocation onboarding”), [{role:“user”,content:q}]);
setAskAnswer(ans);
} catch(e) {
setAskAnswer(getFallbackAnswer(q));
}
setAskLoading(false);
}

function restart() {
setScreen(“splash”); setMessages([]); setApiMsgs([]); setInput(””);
setConvCtx(””); setAskAnswer(””); setAskInput(””);
setFbIdx(1); setUseFallback(false); busy.current = false;
}

“What visa do I actually need?”,
“How do I open a UAE bank account?”,
“What’s the real cost of living?”,
“Is it safe to move here right now?”,
“How long does the Golden Visa take?”,

];

</div>

</div>

<div className="b1"/><div className="b2"/><div className="b3"/>

// ── CHAT ────────────────────────────────────────────────────
if (screen === “chat”) return (
<div style={{minHeight:“100vh”,display:“flex”,flexDirection:“column”,background:C.cream}}>
<div style={{padding:“0.9rem 1.2rem 0”,display:“flex”,alignItems:“center”,justifyContent:“space-between”}}>

<div style={{width:“6px”,height:“6px”,borderRadius:“50%”,background:C.gold,opacity:0.6}}/>
</div>
<div ref={chatRef} style={{flex:1,overflowY:“auto”,padding:“0.8rem 1.2rem 0”,maxWidth:“640px”,width:“100%”,margin:“0 auto”,paddingBottom:“110px”}}>
{messages.map((m,i) => <Bubble key={i} role={m.role} text={m.text}/>)}
{typing && (

<div style={{width:“28px”,height:“28px”,borderRadius:“50%”,background:C.gold,color:C.dark,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:“0.62rem”,fontWeight:“700”,flexShrink:0,marginBottom:“2px”}}>M</div>

</div>

<div style={{height:“0.5rem”}}/>
</div>
<div style={{position:“fixed”,bottom:0,left:0,right:0,background:“rgba(250,247,242,0.97)”,backdropFilter:“blur(12px)”,borderTop:`1px solid ${C.border}`,padding:“0.85rem 1.2rem”,zIndex:100}}>

<button onClick={sendMessage} disabled={typing||!input.trim()}

</button>
</div>
</div>
</div>
);

// ── EMAIL CAPTURE ────────────────────────────────────────────
if (screen === “email”) return (
